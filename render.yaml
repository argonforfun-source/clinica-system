services:
  - type: static
    name: clinica-pro
    env: static
    buildCommand: ""
    publishPath: "."
    headers:
      - path: "/*"
        name: "X-Content-Type-Options"
        value: "nosniff"
      - path: "/*"
        name: "X-Frame-Options"
        value: "SAMEORIGIN"
      - path: "/*"
        name: "X-XSS-Protection"
        value: "1; mode=block"
      - path: "/*"
        name: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
      - path: "/sw.js"
        name: "Cache-Control"
        value: "no-cache"
      - path: "/*.html"
        name: "Cache-Control"
        value: "no-cache"
