<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أرغون — بدون إنترنت</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #f0fdfa, #e0f7f4);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 20px; color: #0f172a;
    }
    .box { max-width: 360px; }
    .icon { font-size: 80px; margin-bottom: 20px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 10px; color: #0f766e; }
    p { font-size: 0.95rem; color: #64748b; margin-bottom: 30px; line-height: 1.7; }
    .btn {
      background: linear-gradient(135deg, #0d9488, #0ea5e9);
      color: white; border: none; padding: 14px 32px;
      border-radius: 14px; font-family: 'Tajawal', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(13,148,136,0.3);
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .tips { margin-top: 30px; padding: 16px; background: rgba(13,148,136,0.06); border-radius: 14px; border: 1px solid rgba(13,148,136,0.15); }
    .tips li { font-size: 0.82rem; color: #64748b; text-align: right; margin-bottom: 6px; list-style: none; }
    .tips li::before { content: '✓ '; color: #0d9488; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تأكد من اتصالك بالإنترنت للوصول إلى خدمة حجز المواعيد</p>
    <button class="btn" onclick="window.location.reload()">🔄 إعادة المحاولة</button>
    <div class="tips" style="margin-top:20px">
      <li>تحقق من اتصال الواي فاي</li>
      <li>تحقق من بيانات الهاتف</li>
      <li>انتظر لحظة ثم حاول مجدداً</li>
    </div>
  </div>
</body>
</html>
